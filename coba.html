<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/styleCoba.css">
</head>
<body>
<div class='popupBackground'>
                <div class='kotakTengah'>
                    <p class='judulKotak'>Edit User</p>
        
                <form method='POST' class='isiPopup'>

                    <input type='hidden' name='id_edit' value='$id'>

                    <input type='text' name='username' class='kotakInput' placeholder='Username' value='$username'>
                    <input type='text' name='no_telepon' class='kotakInput' placeholder='No HP' value='$telepon'>
                    <input type='text' name='email' class='kotakInput' placeholder='Email' value='$email'>
                    <input type='text' name='alamat' class='kotakInput' placeholder='Alamat' value='$alamat'>

                <div class='kotakRadio'>
                <label>
                    <input type='radio' name='tipe' value='siswa' $cekSiswa> Siswa
                </label>

                <label>
                    <input type='radio' name='tipe' value='guru' $cekGuru> Guru
                </label>

                <label>
                    <input type='radio' name='tipe' value='orang_luar' $cekOrangluar> Orang Luar
                </label>
                </div>

            <div class='kotakRadio'>
                <label>
                    <input type='radio' name='role' value='penjual' $cekPenjual> Penjual
                </label>

                <label>
                    <input type='radio' name='role' value='pembeli' $cekPembeli> Pembeli
                </label>
            </div>

           <div class="pemisahTombol">
            <input type='submit' name='simpan_edit' value='Simpan' class='tombolSubmit'>
            <a href='edit.php' class='linkKembali'>Kembali</a>
            </div>
        </form>
    </div>
</div>
</div>
</body>
</html>
